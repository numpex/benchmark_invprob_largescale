method: equivariant_full

general:
  input_dir: /lustre/fswork/projects/rech/fio/commun/cryolithe/empiar-11830
  output_root: ./runs
  run_name: demo-cryo-ei-full
  execution_mode: submitit   # change to 'slurm' to submit via submitit
  max_train_vols: 8 # null = all non-val volumes
  max_val_vols: 4
  seed: 0
  target_shape: null

training:
  num_epochs: 10
  learning_rate: 1.0e-4
  scheduler_gamma: 1 # learning rate constant (no decay)
  scheduler_lr_min: 5.0e-6
  grad_clip: 1.0
  ckp_interval: 1000
  eval_interval: 10
  # Accumulate gradients over this many full volumes before each optimiser step.
  # Compensates for DataLoader batch_size=1.
  grad_accumulation_steps: 2
  model_type: icecream     # "deepinv" (BatchNorm, no dropout) | "icecream" (no norm, dropout=0.1)
  unet_f_maps: 64          # icecream UNet only: base feature-map count
  unet_num_levels: 4       # icecream UNet only: encoder depth
  unet_dropout: 0.1        # icecream UNet only: dropout probability

data:
  batch_size: 1          # always 1 full volume per item
  num_workers: 1
  pin_memory: true
  prefetch_factor: 1
  persistent_workers: true

distributed:
  # UNet tile size — must be strictly < target_shape in every dimension.
  patch_size: [128, 128, 128]
  overlap: [16, 16, 16]
  # Maximum number of tiles processed simultaneously on the GPU.
  # Reduce to save VRAM; increase to improve throughput.
  max_batch_size: 1
  # Gradient checkpointing inside the distributed tiled forward pass.
  checkpoint_batches: "auto"

equivariant:
  tilt_max: 60.0
  tilt_min: -60.0
  use_spherical_support: true
  wedge_double_size: false
  use_fourier: false
  view_as_real: true
  eq_weight: 2
  eq_use_direct: false
  no_window: false


  wedge_low_support: 0.0
  ref_wedge_support: 1.0
  eval_fsc: true
  fsc_threshold: 0.143   # gold-standard FSC resolution criterion
  # Fallback pixel size (Å/px) used when the MRC header voxel_size == 0.
  # Leave as null to fall back to 1.0 (resolution reported in shells, not Å).
  pixel_size_angstrom: 7.84


slurm:
  job_name: demo-cryo-ei-full
  nodes: 4
  gpus_per_node: 4
  ntasks_per_node: 4
  cpus_per_task: 20
  time: "02:00:00"
  account: "fio@h100"
  constraint: "h100"
  qos: "qos_gpu_h100-dev"
  stderr_to_stdout: true
  setup:
    - "module purge"
    - "module load arch/h100"
    - "module load pytorch-gpu/py3/2.7.0"
    - "export NCCL_DEBUG=INFO"
