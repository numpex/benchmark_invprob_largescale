method: equivariant_full

general:
  input_dir: ./dataset/empiar-11830
  output_root: ./runs
  run_name: demo-cryo-ei-full
  execution_mode: local   # change to 'slurm' to submit via submitit
  max_train_vols: 2   # null = all non-val volumes
  max_val_vols: 1
  seed: 0
  target_shape: [32, 64, 64]
  #target_shape: [64, 128, 128]


training:
  num_epochs: 2
  learning_rate: 1.0e-4
  # Exponential decay: lr * gamma^epoch, floored at lr_min.
  # gamma = 10^{-1/10} ≈ 0.7943 → 1e-4 drops to 1e-5 at epoch 10.
  scheduler_gamma: 0.7943
  scheduler_lr_min: 1.0e-6
  grad_clip: 1.0
  ckp_interval: 10
  eval_interval: 1
  # Accumulate gradients over this many full volumes before each optimiser step.
  # Compensates for DataLoader batch_size=1.
  grad_accumulation_steps: 2

data:
  batch_size: 1          # always 1 full volume per item
  num_workers: 1
  pin_memory: true
  prefetch_factor: 1
  persistent_workers: true

distributed:
  # UNet tile size — must be strictly < target_shape in every dimension.
  patch_size: [16, 16, 16]
  overlap: [8, 8, 8]
  # Maximum number of tiles processed simultaneously on the GPU.
  # Reduce to save VRAM; increase to improve throughput.
  max_batch_size: 2
  # Gradient checkpointing inside the distributed tiled forward pass.
  checkpoint_batches: "auto"

equivariant:
  tilt_max: 60.0
  tilt_min: -60.0
  use_spherical_support: true
  # MUST stay false for full volumes: doubling a 512³ FFT is infeasible (~4 GB complex64).
  wedge_double_size: false
  use_fourier: false
  view_as_real: true
  eq_weight: 2.0
  loss_icecream: true
  # If true, EqLoss uses plain spatial MSE instead of Fourier-masked loss. Default false = paper setting.
  eq_use_direct: false
  # If true, disable the box window in ObsLoss and EqLoss.
  no_window: false
  # Low-frequency ball forced to 1 in the input wedge mask.
  # 0 = fully missing wedge (icecream default); 0.1 = keep innermost 10% of frequencies.
  wedge_low_support: 0.0
  # Same for the equivariance reference wedge.
  # 1.0 = full unit sphere kept (icecream default) — EqLoss reference sees complete spectrum.
  ref_wedge_support: 1.0
  # Set to true to compute FSC(f(EVN), f(ODD)) at each eval_interval epoch.
  eval_fsc: true
  fsc_threshold: 0.143   # gold-standard FSC resolution criterion
  # Fallback pixel size (Å/px) used when the MRC header voxel_size == 0.
  # Leave as null to fall back to 1.0 (resolution reported in shells, not Å).
  pixel_size_angstrom: 7.84

slurm:
  job_name: demo-cryo-ei-full
  nodes: 1
  gpus_per_node: 1
  ntasks_per_node: 1
  cpus_per_task: 20
  time: "01:00:00"
  account: "fio@a100"
  constraint: "a100"
  qos: "qos_gpu_a100-dev"
  stderr_to_stdout: true
  setup:
    - "module purge"
    - "module load arch/a100"
    - "module load pytorch-gpu/py3/2.7.0"
    - "export NCCL_DEBUG=INFO"
