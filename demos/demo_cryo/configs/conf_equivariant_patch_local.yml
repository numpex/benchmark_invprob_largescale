method: equivariant_patch

general:
  input_dir: ./dataset/empiar-11830
  output_root: ./runs
  run_name: demo-cryo-ei-patch
  execution_mode: local   # change to 'submitit' to submit via SLURM
  max_train_vols: 1   # null = all non-val volumes
  max_val_vols: 0
  seed: 0

training:
  num_epochs: 5
  learning_rate: 1.0e-4
  scheduler_gamma: 1 # learning rate constant (no decay)
  scheduler_lr_min: 1.0e-6
  grad_clip: 1.0
  ckp_interval: 10
  eval_interval: 1
  grad_accumulation_steps: 1
  log_every_n_epochs: 2     # print loss summary every N epochs
  infer_stride: 36         # icecream default stride for sliding-window inference
  infer_batch_size: 0      # 0 = same as training batch_size
  infer_downsample: 4      # spatial downsample factor before inference (1 = no downsampling)
  infer_train: true        # run inference on training volumes
  infer_val: true          # run inference on validation volumes
  save_mrc: false          # save reconstruction as .mrc file
  model_type: icecream     # "deepinv" (BatchNorm, no dropout) | "icecream" (no norm, dropout=0.1)
  unet_residual: false     # deepinv UNet only: residual connections
  unet_f_maps: 64          # icecream UNet only: base feature-map count
  unet_num_levels: 4       # icecream UNet only: encoder depth
  unet_dropout: 0.1        # icecream UNet only: dropout probability

patch:

  n_crops_per_vol: 2        # virtual crops per volume per epoch
  batch_size: 2
  num_workers: 1
  pin_memory: true
  prefetch_factor: 1
  persistent_workers: true
  normalize: true            # whole-volume zero-mean, unit-std (matches icecream's load_volume normalization)

equivariant:
  tilt_max: 60.0
  tilt_min: -60.0
  use_spherical_support: true
  wedge_double_size: true
  use_fourier: false
  view_as_real: true
  eq_weight: 2.0
  # If true, EqLoss uses plain spatial MSE instead of Fourier-masked loss. Default false = paper setting.
  eq_use_direct: false
  no_window: false
  wedge_low_support: 0.0
  ref_wedge_support: 1.0
  pixel_size_angstrom: 7.84

slurm:
  job_name: demo-cryo-ei-patch
  nodes: 1
  gpus_per_node: 1
  ntasks_per_node: 1
  cpus_per_task: 10
  time: "01:00:00"
  account: "fio@a100"
  constraint: "a100"
  qos: "qos_gpu_a100-dev"
  stderr_to_stdout: true
  setup:
    - "module purge"
    - "module load arch/a100"
    - "module load pytorch-gpu/py3/2.7.0"
    - "export NCCL_DEBUG=INFO"
