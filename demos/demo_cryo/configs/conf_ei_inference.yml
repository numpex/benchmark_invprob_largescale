
method: ei_inference

general:
  execution_mode: submitit 
  input_dir: /lustre/fswork/projects/rech/fio/commun/cryolithe/empiar-11830
  output_root: ./runs
  run_name: demo-cryo-ei-inference
  max_infer_vols: 16
  seed: 0                 # must match training seed to reproduce the same val split
  target_shape: # null

distributed:
  patch_size: [128, 128, 128]
  overlap: [16, 16, 16]
  max_batch_size: 1
  checkpoint_batches: "auto"

inference:
  checkpoint_path: ./runs/demo-cryo-ei-full_32_training_samples_10epochs_loss_icecream/slurm-1711720/checkpoints/ckp_final.pth

  # DataLoader
  num_workers: 1
  pin_memory: true
  prefetch_factor: 1
  persistent_workers: true

  # Physics (must match training config)
  tilt_max: 60.0
  tilt_min: -60.0
  use_spherical_support: true
  wedge_double_size: false
  wedge_low_support: 0.0
  ref_wedge_support: 1.0

  # FSC
  fsc_threshold: 0.143
  pixel_size_angstrom: 7.84  # null = read from MRC header

  # Comparison volume globs (searched inside each tomo_* directory)
  icecream_glob: "vol_*[Ii]cecream*"
  isonet_glob: "vol_*[Ii]so[Nn]et*"
  isonet_fallback_glob: "vol_*DDW*"

  # Output
  save_recon_mrc: false

slurm:
  job_name: demo-cryo-ei-inference
  nodes: 2
  gpus_per_node: 4
  ntasks_per_node: 4
  cpus_per_task: 20
  time: "02:00:00"
  account: "fio@h100"
  constraint: "h100"
  qos: "qos_gpu_h100-dev"
  stderr_to_stdout: true
  setup:
    - "module purge"
    - "module load arch/h100"
    - "module load pytorch-gpu/py3/2.7.0"
    - "export NCCL_DEBUG=INFO"

