# Lightweight CI configuration for inference benchmark smoke tests.
objective:
  - reconstruction_objective

dataset:
  - simulated:
      image_size: 1024
      num_operators: 1
      noise_level: 0.01
      seed: 42

solver:
  - PnP:
      denoiser: drunet
      denoiser_sigma: 0.01
      step_size: 0.1
      init_method: ["zeros"]
      slurm_gres, slurm_ntasks_per_node, slurm_nodes,distribute_physics, distribute_denoiser, patch_size, overlap, max_batch_size: [
        ["gpu:1", 1, 1, false, false, 0, 0, 0],
        ["gpu:2", 2, 1, true, true, 448, 32, 0],
      ]
      

max-runs: 3
n-repetitions: 1
plot: false
html: false
