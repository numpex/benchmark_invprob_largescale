objective:
  - reconstruction_objective

dataset:
  - tomography_3d:
      num_operators: 2

solver:
  - PnP:
      denoiser: drunet
      denoiser_sigma: 0.01
      step_size: 0.1
      init_method: ["pseudo_inverse"]
      distribute_physics, distribute_denoiser, patch_size, overlap, max_batch_size: [
        [false, false, 0, 0, 0],
      ]

max-runs: 10
n-repetitions: 1
plot: false
html: false
