name: Lint

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: uv sync --locked --only-group test

      - name: Check formatting with Black
        run: uv run --no-sync black --check src benchmark_training benchmark_inference tests docs

      - name: Lint with Ruff
        run: uv run --no-sync ruff check src benchmark_training benchmark_inference tests docs
