name: Main CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test-benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BENCHOPT_DEBUG: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: uv sync --all-groups --all-extras

      - name: Tests
        run: uv run pytest

      - name: Prepare benchmarks
        run: |
          uv run benchopt prepare benchmark_inference/. --config benchmark_inference/configs/examples/multiframe_superres.yml
          uv run benchopt prepare benchmark_inference/. --config benchmark_inference/configs/examples/tomography_2d.yml

      - name: Run benchmarks
        run: |
          uv run benchopt run benchmark_inference/. --config benchmark_inference/configs/examples/multiframe_superres.yml
          uv run benchopt run benchmark_inference/. --config benchmark_inference/configs/examples/tomography_2d.yml
