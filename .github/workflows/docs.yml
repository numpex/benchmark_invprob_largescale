name: Website

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  PAGES_ARTIFACT_NAME: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build-site:
    name: Check and build Astro site
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: site

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: npm ci

      - name: Check site
        run: npm run check

      - name: Build site
        run: npm run build

      - name: Upload site build
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: site/dist
          if-no-files-found: error

  build-docs:
    name: Build Sphinx documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: uv sync --extra docs

      - name: Build docs
        run: uv run make -C docs html

      - name: Upload docs build
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: docs/build/html
          if-no-files-found: error

  package-pages:
    name: Assemble GitHub Pages artifact
    runs-on: ubuntu-latest
    needs: [build-site, build-docs]

    steps:
      - name: Download site build
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: pages

      - name: Download documentation build
        uses: actions/download-artifact@v4
        with:
          name: docs-build
          path: pages/documentation

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: pages

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: package-pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}
