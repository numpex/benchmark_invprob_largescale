# Lightweight configuration for the synthetic unrolled-training smoke test.
objective:
  - reconstruction_objective

dataset:
  - synthetic:      
      image_size: [1024]
      num_operators: 1
      channels: 3
      noise_level: 0.1
      seed: 42

solver:
  - UnrolledPnP:
      denoiser: drunet
      n_iter: 2
      init_stepsize: 0.8
      denoiser_sigma: 0.05
      train_algo_params: true
      grad_clip: 1.0
      profiler_mode: [custom]
      profiler_per_step: [true]
      image_size, torchrun_nproc_per_node, distribute_model, patch_size, overlap, max_batch_size, checkpoint_batches: [
        #[256, 2, true,  128, 32, 1, 'always'],
        [512, 1, false,   0,  0, 0, 'never' ],
        [256, 1, true,  128, 32, 1, 'always'],


      ]

max-runs: 2
n-repetitions: 1
plot: true
html: true
