# Lightweight configuration for the synthetic unrolled-training smoke test.
objective:
  - reconstruction_objective

dataset:
  - synthetic:
      num_operators: 4
      channels: 3
      noise_level: 0.1
      seed: 42

solver:
  - UnrolledPnP:
      denoiser: drunet
      n_iter: 3
      init_stepsize: 0.8
      denoiser_sigma: 0.05
      train_algo_params: true
      grad_clip: 1.0
      profiler_mode: [torch]
      profiler_warmup: 1
      profiler_active: 2 # record all remaining iterations after warmup 
      profiler_per_step: [True]
      image_size, slurm_gres, slurm_ntasks_per_node, slurm_nodes, distribute_model, patch_size, overlap, max_batch_size, checkpoint_batches: [
        [512, "gpu:1", 1, 1,  true, 512, 0, 1, 'always'],
        [1024, "gpu:4", 4, 1,  true, 512, 0, 1, 'always'],

      ]

max-runs: 3
n-repetitions: 1
plot: true
html: true
