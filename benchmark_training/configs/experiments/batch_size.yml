# Lightweight configuration for the synthetic unrolled-training smoke test.
objective:
  - reconstruction_objective

dataset:
  - synthetic:
      image_size: [4096]
      num_operators: 4
      channels: 3
      noise_level: 0.1
      seed: 42

solver:
  - UnrolledPnP:
      denoiser: drunet
      n_iter: 5
      init_stepsize: 0.8
      denoiser_sigma: 0.05
      profiler_mode: [custom]
      profiler_warmup: 2
      profiler_active: 3 # record all remaining iterations after warmup 
      max_batch_size : [1,2,4,8,16]
      distribute_model, patch_size, overlap : [[true, 256, 16]]
      slurm_gres, slurm_ntasks_per_node, slurm_nodes, checkpoint_batches : [
        ["gpu:1", 1, 1, 'always'],
        ["gpu:4", 4, 1, 'always'],
        ["gpu:4", 4, 4, 'always'],
      ]

max-runs: 5
n-repetitions: 1
plot: true
html: true
