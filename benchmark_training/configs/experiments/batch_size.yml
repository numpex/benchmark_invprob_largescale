# Lightweight configuration for the synthetic unrolled-training smoke test.
objective:
  - reconstruction_objective

dataset:
  - synthetic:
      image_size: [1024]
      num_operators: 4
      channels: 3
      noise_level: 0.1
      seed: 42

solver:
  - UnrolledPnP:
      denoiser: drunet
      n_iter: 3
      init_stepsize: 0.8
      denoiser_sigma: 0.05
      train_algo_params: true
      grad_clip: 1.0
      profiler_mode: [custom]
      profiler_warmup: 1
      profiler_active: 2 # record all remaining iterations after warmup 
      max_batch_size : [1,2,4]
      distribute_model, patch_size, overlap, checkpoint_batches :
      [true, 256, 32,  'always']
      slurm_gres, slurm_ntasks_per_node, slurm_nodes, distribute_model, patch_size, overlap, checkpoint_batches: [
        ["gpu:1", 1, 1],
        ["gpu:2", 2, 1],

      ]

max-runs: 3
n-repetitions: 1
plot: true
html: true
