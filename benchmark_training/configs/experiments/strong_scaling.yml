# Lightweight configuration for the synthetic unrolled-training smoke test.
objective:
  - reconstruction_objective

dataset:
  - synthetic:
      num_operators: 4
      channels: 3
      noise_level: 0.1
      seed: 42

solver:
  - UnrolledPnP:
      denoiser: drunet
      n_iter: 5
      init_stepsize: 0.8
      denoiser_sigma: 0.05
      train_algo_params: true
      grad_clip: 1.0
      profiler_mode: [custom]
      profiler_warmup: 2
      profiler_active: 3 # record all remaining iterations after warmup 
      profiler_per_step: [True]
      distribute_model, patch_size, overlap, max_batch_size, checkpoint_batches: [
        [true, 512, 32, 1, 'always']
      ]

      slurm_gres, slurm_ntasks_per_node, slurm_nodes, image_size: [
        ["gpu:1", 1, 1, 1024],
        ["gpu:2", 2, 1,  1024],
        ["gpu:4", 4, 1,  1024],

        ["gpu:1", 1, 1, 4096 ],
        ["gpu:2", 2, 1,  4096 ],
        ["gpu:4", 4, 1,  4096 ],
        ["gpu:4", 4, 2,  4096 ],
        ["gpu:4", 4, 4,  4096 ],


        ["gpu:4", 4, 1,  8192 ],
        ["gpu:4", 4, 2,  8192 ],
        ["gpu:4", 4, 4,  8192 ],
        ["gpu:4", 4, 8,  8192 ],
        ["gpu:4", 4, 16,  8192 ],

      ]

max-runs: 5
n-repetitions: 1
plot: true
html: true
