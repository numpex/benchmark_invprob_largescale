# Benchopt configuration for the radio interferometry streaming benchmark.

objective:
  - streaming_reconstruction_objective

dataset:
  - radio_interferometry_stream:
      data_root: /lustre/fswork/projects/rech/fio/commun/dataset_radio_1024/
      image_size: 256
      noise_level: 0.01
      max_samples: 5
      stream_length: 64
      rate_hz: 0.0
      queue_capacity: 4
      drop_policy: block
      visibility_column: DATA
      seed: 42

solver:
  - PnPStreamSimAIBench:
      orchestrator_name: ["ray"]
      server_type: ["filesystem"]
      device: cuda
      ncpus: 2
      ngpus: 1
      batch_size: 1
      inner_iterations: 1
      step_size: 0.8
      denoiser_sigma: 0.05
      denoiser_kernel_size: 3
      denoiser_lambda_relaxation: null
      poll_interval_s: 0.01
      result_timeout_s: 300.0

max-runs: 1
n-repetitions: 1
plot: false
html: false
